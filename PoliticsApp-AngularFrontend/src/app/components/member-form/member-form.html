<form [formGroup]="memberForm" (submit)="submitForm()">
  <div>
    <label for="id">ID </label>
  </div>
  <div>
    <input type="text" id="id" name="id" formControlName="id"/>
  </div>
  <div>
    <label for="name">Imię </label>
  </div>
  <div>
    <input type="text" id="name" name="name" formControlName="name"/>
  </div>
  <div>
    <label for="surname">Nazwisko </label>
  </div>
  <div>
    <input type="text" id="surname" name="surname" formControlName="surname"/>
  </div>
  <div>
    <label for="dateOfBirth">Data urodzenia </label>
  </div>
  <div>
    <input type="date" id="dateOfBirth" name="dateOfBirth" formControlName="dateOfBirth"/>
  </div>
  <div>
    <label for="placeOfBirth">Miejsce urodzenia </label>
  </div>
  <div>
    <input type="text" id="placeOfBirth" name="placeOfBirth" formControlName="placeOfBirth"/>
  </div>
  <div>
    <label for="constituency">Okręg wyborczy </label>
  </div>
  <div>
    <input type="number" id="constituency" name="constituency" formControlName="constituency"/>
  </div>
  <div>
    <label for="politicalPartyId">ID parii politycznej </label>
  </div>
  <div>
    <input type="text" id="politicalPartyId" name="politicalPartyId" formControlName="politicalPartyId"/>
  </div>
  <table>
    <tr>
      <td>
        <button type="submit">Zapisz</button>
      </td>
      <td>
        <button routerLink="/political-parties/{{partyId}}">Anuluj</button>
      </td>
    </tr>
  </table>
</form>
